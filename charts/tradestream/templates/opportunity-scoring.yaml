{{- if .Values.opportunityScoring.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tradestream.fullname" . }}-opportunity-scoring
  labels:
    {{- include "tradestream.labels" . | nindent 4 }}
    app.kubernetes.io/component: opportunity-scoring
spec:
  replicas: {{ .Values.opportunityScoring.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "tradestream.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: opportunity-scoring
  template:
    metadata:
      labels:
        {{- include "tradestream.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: opportunity-scoring
    spec:
      containers:
        - name: opportunity-scoring
          image: "{{ .Values.opportunityScoring.image.repository }}:{{ .Values.opportunityScoring.image.tag }}"
          imagePullPolicy: {{ .Values.opportunityScoring.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: {{ .Values.opportunityScoring.service.port | default 8080 }}
              protocol: TCP
          env:
            - name: API_PORT
              value: "{{ .Values.opportunityScoring.service.port | default 8080 }}"
            - name: API_HOST
              value: "{{ .Values.opportunityScoring.service.host | default "0.0.0.0" }}"
          resources:
            {{- toYaml .Values.opportunityScoring.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tradestream.fullname" . }}-opportunity-scoring
  labels:
    {{- include "tradestream.labels" . | nindent 4 }}
    app.kubernetes.io/component: opportunity-scoring
spec:
  type: {{ .Values.opportunityScoring.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.opportunityScoring.service.port | default 8080 }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "tradestream.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: opportunity-scoring
{{- end }}
