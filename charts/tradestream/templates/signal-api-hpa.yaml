{{- if and .Values.signalApi.enabled .Values.signalApi.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "tradestream.fullname" . }}-signal-api
  labels:
    {{- include "tradestream.labels" . | nindent 4 }}
    app.kubernetes.io/component: signal-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "tradestream.fullname" . }}-signal-api
  minReplicas: {{ .Values.signalApi.autoscaling.minReplicas | default 1 }}
  maxReplicas: {{ .Values.signalApi.autoscaling.maxReplicas | default 5 }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.signalApi.autoscaling.targetCPUUtilizationPercentage | default 70 }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.signalApi.autoscaling.targetMemoryUtilizationPercentage | default 80 }}
{{- end }}
