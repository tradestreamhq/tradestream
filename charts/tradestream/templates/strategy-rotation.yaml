{{- if .Values.strategyRotation.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tradestream.fullname" . }}-strategy-rotation
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "tradestream.name" . }}
    component: strategy-rotation
    release: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "tradestream.name" . }}
      component: strategy-rotation
  template:
    metadata:
      labels:
        app: {{ include "tradestream.name" . }}
        component: strategy-rotation
    spec:
      restartPolicy: Always
      containers:
        - name: strategy-rotation
          image: "{{ .Values.strategyRotation.image.repository }}:{{ .Values.strategyRotation.image.tag }}"
          imagePullPolicy: {{ .Values.strategyRotation.image.pullPolicy }}
          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: POSTGRES_HOST
              value: {{ tpl .Values.strategyRotation.config.postgresHost . | quote }}
            - name: POSTGRES_PORT
              value: {{ .Values.strategyRotation.config.postgresPort | quote }}
            - name: POSTGRES_DATABASE
              value: {{ .Values.strategyRotation.config.postgresDatabase | quote }}
            - name: POSTGRES_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.strategyRotation.secrets.postgresCredentials.name }}
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.strategyRotation.secrets.postgresCredentials.name }}
                  key: password
          args:
            - "--postgres_host=$(POSTGRES_HOST)"
            - "--postgres_port=$(POSTGRES_PORT)"
            - "--postgres_database=$(POSTGRES_DATABASE)"
            - "--postgres_username=$(POSTGRES_USERNAME)"
            - "--postgres_password=$(POSTGRES_PASSWORD)"
            - "--rotation_interval_seconds={{ .Values.strategyRotation.config.rotationIntervalSeconds }}"
            - "--health_port=8080"
          resources:
            requests:
              cpu: {{ .Values.strategyRotation.resources.requests.cpu | quote }}
              memory: {{ .Values.strategyRotation.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.strategyRotation.resources.limits.cpu | quote }}
              memory: {{ .Values.strategyRotation.resources.limits.memory | quote }}
{{- end }}
