{{- if .Values.billing.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tradestream.fullname" . }}-billing
  labels:
    {{- include "tradestream.labels" . | nindent 4 }}
    app.kubernetes.io/component: billing
spec:
  replicas: {{ .Values.billing.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "tradestream.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: billing
  template:
    metadata:
      labels:
        {{- include "tradestream.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: billing
    spec:
      containers:
        - name: billing
          image: "{{ .Values.billing.image.repository }}:{{ .Values.billing.image.tag }}"
          imagePullPolicy: {{ .Values.billing.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: {{ .Values.billing.service.port | default 8081 }}
              protocol: TCP
          env:
            - name: POSTGRES_HOST
              value: "{{ include "tradestream.fullname" . }}-postgresql"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DATABASE
              value: "tradestream"
            - name: POSTGRES_USERNAME
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "{{ include "tradestream.fullname" . }}-postgresql"
                  key: "postgres-password"
            - name: API_PORT
              value: "{{ .Values.billing.service.port | default 8081 }}"
            - name: API_HOST
              value: "{{ .Values.billing.service.host | default "0.0.0.0" }}"
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.billing.secrets.stripeSecretKey.name }}
                  key: {{ .Values.billing.secrets.stripeSecretKey.key }}
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.billing.secrets.stripeWebhookSecret.name }}
                  key: {{ .Values.billing.secrets.stripeWebhookSecret.key }}
          resources:
            {{- toYaml .Values.billing.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tradestream.fullname" . }}-billing
  labels:
    {{- include "tradestream.labels" . | nindent 4 }}
    app.kubernetes.io/component: billing
spec:
  type: {{ .Values.billing.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.billing.service.port | default 8081 }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "tradestream.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: billing
{{- end }}
