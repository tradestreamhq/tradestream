{{- if .Values.learningApi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tradestream.fullname" . }}-learning-api
  labels:
    {{- include "tradestream.labels" . | nindent 4 }}
    app.kubernetes.io/component: learning-api
spec:
  replicas: {{ .Values.learningApi.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "tradestream.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: learning-api
  template:
    metadata:
      labels:
        {{- include "tradestream.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: learning-api
    spec:
      containers:
        - name: learning-api
          image: "{{ .Values.learningApi.image.repository }}:{{ .Values.learningApi.image.tag }}"
          imagePullPolicy: {{ .Values.learningApi.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: {{ .Values.learningApi.service.port | default 8080 }}
              protocol: TCP
          env:
            - name: POSTGRES_HOST
              value: "{{ include "tradestream.fullname" . }}-postgresql"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DATABASE
              value: "tradestream"
            - name: POSTGRES_USERNAME
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "{{ include "tradestream.fullname" . }}-postgresql"
                  key: "postgres-password"
            - name: API_PORT
              value: "{{ .Values.learningApi.service.port | default 8080 }}"
            - name: API_HOST
              value: "{{ .Values.learningApi.service.host | default "0.0.0.0" }}"
          resources:
            {{- toYaml .Values.learningApi.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tradestream.fullname" . }}-learning-api
  labels:
    {{- include "tradestream.labels" . | nindent 4 }}
    app.kubernetes.io/component: learning-api
spec:
  type: {{ .Values.learningApi.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.learningApi.service.port | default 8080 }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "tradestream.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: learning-api
{{- end }}
