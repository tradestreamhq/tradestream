{{- if .Values.riskAdjustedSizing.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "tradestream.fullname" . }}-risk-adjusted-sizing
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "tradestream.name" . }}
    component: risk-adjusted-sizing
    release: {{ .Release.Name }}
spec:
  schedule: "{{ .Values.riskAdjustedSizing.schedule }}"
  {{- if .Values.riskAdjustedSizing.startingDeadlineSeconds }}
  startingDeadlineSeconds: {{ .Values.riskAdjustedSizing.startingDeadlineSeconds }}
  {{- end }}
  concurrencyPolicy: "{{ .Values.riskAdjustedSizing.concurrencyPolicy }}"
  failedJobsHistoryLimit: {{ .Values.riskAdjustedSizing.failedJobsHistoryLimit }}
  successfulJobsHistoryLimit: {{ .Values.riskAdjustedSizing.successfulJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.riskAdjustedSizing.job.backoffLimit | default 2 }}
      ttlSecondsAfterFinished: {{ .Values.riskAdjustedSizing.job.ttlSecondsAfterFinished | default 3600 }}
      template:
        metadata:
          labels:
            app: {{ include "tradestream.name" . }}
            component: risk-adjusted-sizing
            release: {{ .Release.Name }}
        spec:
          restartPolicy: {{ .Values.riskAdjustedSizing.job.restartPolicy | default "OnFailure" }}
          containers:
            - name: risk-adjusted-sizing
              image: "{{ .Values.riskAdjustedSizing.image.repository }}:{{ .Values.riskAdjustedSizing.image.tag }}"
              imagePullPolicy: {{ .Values.riskAdjustedSizing.image.pullPolicy }}
              env:
                # PostgreSQL Configuration
                - name: POSTGRES_HOST
                  value: {{ tpl .Values.riskAdjustedSizing.database.host . | quote }}
                - name: POSTGRES_PORT
                  value: {{ .Values.riskAdjustedSizing.database.port | quote }}
                - name: POSTGRES_DATABASE
                  value: "{{ .Values.riskAdjustedSizing.database.database }}"
                - name: POSTGRES_USERNAME
                  value: "{{ .Values.riskAdjustedSizing.database.username }}"
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ tpl .Values.riskAdjustedSizing.database.passwordSecret.name . }}
                      key: {{ .Values.riskAdjustedSizing.database.passwordSecret.key }}
                # Risk Configuration
                - name: MAX_PORTFOLIO_RISK
                  value: "{{ .Values.riskAdjustedSizing.config.maxPortfolioRisk }}"
                - name: MAX_POSITION_RISK
                  value: "{{ .Values.riskAdjustedSizing.config.maxPositionRisk }}"
                - name: RISK_FREE_RATE
                  value: "{{ .Values.riskAdjustedSizing.config.riskFreeRate }}"
                - name: KELLY_FRACTION
                  value: "{{ .Values.riskAdjustedSizing.config.kellyFraction }}"
                - name: MAX_LEVERAGE
                  value: "{{ .Values.riskAdjustedSizing.config.maxLeverage }}"
              args:
                - "--postgres_host=$(POSTGRES_HOST)"
                - "--postgres_port=$(POSTGRES_PORT)"
                - "--postgres_database=$(POSTGRES_DATABASE)"
                - "--postgres_username=$(POSTGRES_USERNAME)"
                - "--postgres_password=$(POSTGRES_PASSWORD)"
                - "--max_portfolio_risk=$(MAX_PORTFOLIO_RISK)"
                - "--max_position_risk=$(MAX_POSITION_RISK)"
                - "--risk_free_rate=$(RISK_FREE_RATE)"
                - "--kelly_fraction=$(KELLY_FRACTION)"
                - "--max_leverage=$(MAX_LEVERAGE)"
              resources:
                requests:
                  cpu: "{{ .Values.riskAdjustedSizing.resources.requests.cpu }}"
                  memory: "{{ .Values.riskAdjustedSizing.resources.requests.memory }}"
                limits:
                  cpu: "{{ .Values.riskAdjustedSizing.resources.limits.cpu }}"
                  memory: "{{ .Values.riskAdjustedSizing.resources.limits.memory }}"
{{- end }}
