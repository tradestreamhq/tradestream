{{- if and .Values.backtesting.enabled .Values.backtesting.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "tradestream.fullname" . }}-backtesting
  labels:
    {{- include "tradestream.labels" . | nindent 4 }}
    app.kubernetes.io/component: backtesting
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "tradestream.fullname" . }}-backtesting
  minReplicas: {{ .Values.backtesting.autoscaling.minReplicas | default 1 }}
  maxReplicas: {{ .Values.backtesting.autoscaling.maxReplicas | default 5 }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.backtesting.autoscaling.targetCPUUtilizationPercentage | default 70 }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.backtesting.autoscaling.targetMemoryUtilizationPercentage | default 80 }}
{{- end }}
