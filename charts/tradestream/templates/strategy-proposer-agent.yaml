{{- if .Values.strategyProposerAgent.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "tradestream.fullname" . }}-strategy-proposer-agent
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "tradestream.name" . }}
    component: strategy-proposer-agent
    release: {{ .Release.Name }}
spec:
  schedule: "{{ .Values.strategyProposerAgent.schedule }}"
  {{- if .Values.strategyProposerAgent.startingDeadlineSeconds }}
  startingDeadlineSeconds: {{ .Values.strategyProposerAgent.startingDeadlineSeconds }}
  {{- end }}
  concurrencyPolicy: "Forbid"
  failedJobsHistoryLimit: {{ .Values.strategyProposerAgent.failedJobsHistoryLimit }}
  successfulJobsHistoryLimit: {{ .Values.strategyProposerAgent.successfulJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.strategyProposerAgent.job.backoffLimit | default 2 }}
      ttlSecondsAfterFinished: {{ .Values.strategyProposerAgent.job.ttlSecondsAfterFinished | default 3600 }}
      template:
        metadata:
          labels:
            app: {{ include "tradestream.name" . }}
            component: strategy-proposer-agent
            release: {{ .Release.Name }}
        spec:
          restartPolicy: {{ .Values.strategyProposerAgent.job.restartPolicy | default "OnFailure" }}
          containers:
            - name: strategy-proposer-agent
              image: "{{ .Values.strategyProposerAgent.image.repository }}:{{ .Values.strategyProposerAgent.image.tag }}"
              imagePullPolicy: {{ .Values.strategyProposerAgent.image.pullPolicy }}
              env:
                - name: OPENROUTER_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.strategyProposerAgent.openrouter.secretName }}
                      key: {{ .Values.strategyProposerAgent.openrouter.secretKey }}
                - name: MCP_STRATEGY_URL
                  value: {{ .Values.strategyProposerAgent.mcpStrategyUrl | quote }}
                - name: MCP_MARKET_URL
                  value: {{ .Values.strategyProposerAgent.mcpMarketUrl | quote }}
              args:
                - "--openrouter_api_key=$(OPENROUTER_API_KEY)"
                - "--mcp_strategy_url=$(MCP_STRATEGY_URL)"
                - "--mcp_market_url=$(MCP_MARKET_URL)"
                - "--interval_seconds=0"
              resources:
                requests:
                  cpu: "{{ .Values.strategyProposerAgent.resources.requests.cpu }}"
                  memory: "{{ .Values.strategyProposerAgent.resources.requests.memory }}"
                limits:
                  cpu: "{{ .Values.strategyProposerAgent.resources.limits.cpu }}"
                  memory: "{{ .Values.strategyProposerAgent.resources.limits.memory }}"
{{- end }}
