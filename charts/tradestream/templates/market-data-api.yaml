{{- if .Values.marketDataApi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tradestream.fullname" . }}-market-data-api
  labels:
    {{- include "tradestream.labels" . | nindent 4 }}
    app.kubernetes.io/component: market-data-api
spec:
  replicas: {{ .Values.marketDataApi.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "tradestream.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: market-data-api
  template:
    metadata:
      labels:
        {{- include "tradestream.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: market-data-api
    spec:
      containers:
        - name: market-data-api
          image: "{{ .Values.marketDataApi.image.repository }}:{{ .Values.marketDataApi.image.tag }}"
          imagePullPolicy: {{ .Values.marketDataApi.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: {{ .Values.marketDataApi.service.port | default 8080 }}
              protocol: TCP
          env:
            - name: INFLUXDB_URL
              value: {{ tpl .Values.marketDataApi.influxdb.url . | quote }}
            - name: INFLUXDB_ORG
              value: "{{ .Values.marketDataApi.influxdb.org }}"
            - name: INFLUXDB_BUCKET
              value: "{{ .Values.marketDataApi.influxdb.bucket }}"
            - name: INFLUXDB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.marketDataApi.influxdb.tokenSecret.name }}
                  key: {{ .Values.marketDataApi.influxdb.tokenSecret.key }}
            - name: REDIS_HOST
              value: {{ tpl .Values.marketDataApi.redis.host . | quote }}
            - name: REDIS_PORT
              value: {{ .Values.marketDataApi.redis.port | quote }}
            - name: API_PORT
              value: "{{ .Values.marketDataApi.service.port | default 8080 }}"
            - name: API_HOST
              value: "{{ .Values.marketDataApi.service.host | default "0.0.0.0" }}"
          resources:
            {{- toYaml .Values.marketDataApi.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tradestream.fullname" . }}-market-data-api
  labels:
    {{- include "tradestream.labels" . | nindent 4 }}
    app.kubernetes.io/component: market-data-api
spec:
  type: {{ .Values.marketDataApi.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.marketDataApi.service.port | default 8080 }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "tradestream.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: market-data-api
{{- end }}
