{{- if .Values.paperTrading.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tradestream.fullname" . }}-paper-trading
  labels:
    {{- include "tradestream.labels" . | nindent 4 }}
    app.kubernetes.io/component: paper-trading
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "tradestream.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: paper-trading
  template:
    metadata:
      labels:
        {{- include "tradestream.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: paper-trading
    spec:
      containers:
        - name: paper-trading
          image: "{{ .Values.paperTrading.image.repository }}:{{ .Values.paperTrading.image.tag }}"
          imagePullPolicy: {{ .Values.paperTrading.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: {{ .Values.paperTrading.config.port }}
              protocol: TCP
          env:
            - name: POSTGRES_HOST
              value: {{ tpl .Values.paperTrading.database.host . | quote }}
            - name: POSTGRES_PORT
              value: {{ .Values.paperTrading.database.port | quote }}
            - name: POSTGRES_DATABASE
              value: {{ .Values.paperTrading.database.database | quote }}
            - name: POSTGRES_USERNAME
              value: {{ .Values.paperTrading.database.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ tpl .Values.paperTrading.database.passwordSecret.name . }}
                  key: {{ .Values.paperTrading.database.passwordSecret.key }}
            - name: MCP_MARKET_URL
              value: "http://{{ include "tradestream.fullname" . }}-market-mcp:8080"
            - name: MCP_SIGNAL_URL
              value: "http://{{ include "tradestream.fullname" . }}-signal-mcp:8080"
          args:
            - "--postgres_host=$(POSTGRES_HOST)"
            - "--postgres_port=$(POSTGRES_PORT)"
            - "--postgres_database=$(POSTGRES_DATABASE)"
            - "--postgres_username=$(POSTGRES_USERNAME)"
            - "--postgres_password=$(POSTGRES_PASSWORD)"
            - "--mcp_market_url=$(MCP_MARKET_URL)"
            - "--mcp_signal_url=$(MCP_SIGNAL_URL)"
            - "--port={{ .Values.paperTrading.config.port }}"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.paperTrading.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tradestream.fullname" . }}-paper-trading
  labels:
    {{- include "tradestream.labels" . | nindent 4 }}
    app.kubernetes.io/component: paper-trading
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.paperTrading.config.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "tradestream.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: paper-trading
{{- end }}
