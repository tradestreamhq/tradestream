# Strategy Confidence Scorer CronJob configuration
strategyConfidenceScorer:
  enabled: true
  schedule: "*/5 * * * *"
  startingDeadlineSeconds: 300
  image:
    repository: "ghcr.io/tradestreamhq/strategy-confidence-scorer"
    pullPolicy: IfNotPresent
    tag: "v2.45.97-develop"
