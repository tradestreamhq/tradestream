# Global settings - required for using bitnamilegacy images
global:
  security:
    # Allow using bitnamilegacy images (Bitnami moved free images there)
    # See: https://github.com/bitnami/charts/issues/30850
    allowInsecureImages: true

# Flink Kubernetes Operator - controls whether to install the operator as a dependency
# Set to false if installing the operator separately (e.g., for webhook timing issues)
flink-kubernetes-operator:
  enabled: true

influxdb:
  enabled: true
  # Authentication configuration
  adminUser:
    # Organization and bucket settings
    organization: "tradestream-org"
    bucket: "tradestream-data"
    retention_policy: "365d"
    # User credentials
    user: "admin"
    # Use existing secret (this will ignore password and token values)
    existingSecret: "influxdb-admin-secret"
    # Remove these when using existingSecret:
    # password: ""
    # token: ""
  # Storage configuration
  persistence:
    enabled: true
    size: 20Gi
kafka:
  # Use bitnamilegacy repository since bitnami moved images there
  image:
    registry: docker.io
    repository: bitnamilegacy/kafka
    tag: 4.0.0-debian-12-r10
  replicaCount: 3
  persistence:
    enabled: true
    size: 10Gi
    accessModes:
      - ReadWriteOnce
  listeners:
    client:
      protocol: SSL
    controller:
      protocol: PLAINTEXT
  tls:
    autoGenerated:
      enabled: true
  configurationOverrides:
    "controller.quorum.voters": "0@kafka-0.kafka-headless:9093,1@kafka-1.kafka-headless:9093,2@kafka-2.kafka-headless:9093"
    "controller.listener.names": "CONTROLLER"
    "process.roles": "broker,controller"
    "node.id": "${HOSTNAME##*-}"
    "controller.quorum.election.backoff.ms": "1000"
    "controller.quorum.election.timeout.ms": "10000"
    "controller.quorum.fetch.timeout.ms": "2000"
    "controller.quorum.voter.connect.timeout.ms": "30000"
    "controller.quorum.request.timeout.ms": "2000"
    "controller.quorum.retry.backoff.ms": "20"
    "controller.quorum.append.linger.ms": "25"
    "controller.quorum.election.backoff.max.ms": "5000"
    "controller.quorum.election.timeout.max.ms": "50000"
    "controller.quorum.fetch.timeout.max.ms": "10000"
    "controller.quorum.voter.connect.timeout.max.ms": "60000"
    "controller.quorum.request.timeout.max.ms": "10000"
    "controller.quorum.retry.backoff.max.ms": "100"
    "controller.quorum.append.linger.max.ms": "100"
    "log.retention.hours": "168"
    "log.segment.bytes": "1073741824"
    "log.retention.check.interval.ms": "300000"
    "num.partitions": "3"
    "default.replication.factor": "3"
    "min.insync.replicas": "2"
    "offsets.topic.replication.factor": "3"
    "transaction.state.log.replication.factor": "3"
    "transaction.state.log.min.isr": "2"
  podSecurityContext:
    runAsUser: 1001
    fsGroup: 1001
  containerSecurityContext:
    runAsUser: 1001
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  startupProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
    successThreshold: 1
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
  readinessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
  podDisruptionBudget:
    enabled: true
    minAvailable: 2
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  podManagementPolicy: Parallel
  controller:
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "1"
        memory: "2Gi"
    # Use heapOpts instead of extraEnvVars to avoid duplicate KAFKA_HEAP_OPTS
    heapOpts: "-Xmx1g -Xms1g"
# Kafka SSL client configuration (shared by all Kafka clients)
kafkaSsl:
  # Set to true to enable SSL for Kafka client connections.
  # When false, services connect to Kafka using PLAINTEXT.
  enabled: true
  # Auto-generated by Bitnami Kafka chart when tls.autoGenerated.enabled=true
  # Uses the first broker's TLS secret which contains ca.crt, tls.crt, tls.key
  secretName: '{{ include "tradestream.fullname" . }}-kafka-0-tls'
  # Mount path for SSL certificates inside containers
  mountPath: "/etc/kafka/ssl"
  # File names within the secret
  caFile: "ca.crt"
  certFile: "tls.crt"
  keyFile: "tls.key"
  # JKS stores for Java clients
  truststoreFile: "kafka.truststore.jks"
  keystoreFile: "kafka.keystore.jks"
  # Secret containing JKS passwords
  passwordSecretName: "kafka-ssl-passwords"
  passwordSecretKeys:
    truststorePassword: "truststore-password"
    keystorePassword: "keystore-password"
    keyPassword: "key-password"

kafkaUi:
  replicaCount: 1
  image:
    repository: provectuslabs/kafka-ui
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
    upgradeMode: stateless
strategyDiscoveryPipeline:
  enabled: true
  image:
    repository: ghcr.io/tradestreamhq/strategy-discovery-pipeline
    tag: v2.45.97-develop
    pullPolicy: IfNotPresent
  version: v1_18
  configuration:
    env.java.opts.jobmanager: "-Dio.jenetics.util.defaultRandomGenerator=Random -XX:+IgnoreUnrecognizedVMOptions --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.util=ALL-UNNAMED"
    env.java.opts.taskmanager: "-Dio.jenetics.util.defaultRandomGenerator=Random -XX:+IgnoreUnrecognizedVMOptions --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.util=ALL-UNNAMED"
    taskmanager.numberOfTaskSlots: "1"
    execution.checkpointing.interval: "300000"
    execution.checkpointing.mode: "EXACTLY_ONCE"
    execution.checkpointing.timeout: "1800000"
    execution.checkpointing.externalized-checkpoint-retention: "RETAIN_ON_CANCELLATION"
    state.backend: "rocksdb"
    state.backend.incremental: "true"
  serviceAccount: flink
  jobManager:
    memory: 4096m
    cpu: 2
  taskManager:
    memory: 4096m
    cpu: 2
  job:
    entryClass: com.verlumen.tradestream.discovery.StrategyDiscoveryPipelineRunner
    jarURI: local:///src/main/java/com/verlumen/tradestream/discovery/app_deploy.jar
    parallelism: 1
    upgradeMode: stateless
  # Database configuration - now uses the PostgreSQL chart
  database:
    # These will be templated to use the PostgreSQL service from the chart
    host: '{{ include "tradestream.fullname" . }}-postgresql'
    port: 5432
    database: "tradestream"
    username: "postgres"
    # Reference the auto-generated PostgreSQL secret
    passwordSecret:
      name: '{{ include "tradestream.fullname" . }}-postgresql'
      key: "postgres-password"
candleIngestor:
  enabled: true
  schedule: "*/1 * * * *" # Run every 1 minute
  runMode: "wet" # Default run mode for the job
  startingDeadlineSeconds: 300 # Add deadline to prevent too many missed start times
  job:
    backoffLimit: 2
    ttlSecondsAfterFinished: 3600 # Cleans up finished jobs after 1 hour
    restartPolicy: "OnFailure"
  image:
    repository: "ghcr.io/tradestreamhq/candle-ingestor"
    pullPolicy: IfNotPresent
    tag: "v2.45.97-develop"
  config:
    # CCXT Exchange Configuration
    exchanges:
      - "coinbase" # High volume, U.S. based
      - "kraken" # High volume, U.S. friendly
      - "binanceus" # U.S. specific, good U.S. volume
      - "bitstamp" # Good volume, U.S. accessible
      - "cryptocom" # Decent volume, U.S. regulated
      - "gemini" # Decent volume, U.S. regulated
    minExchangesRequired: 2
    # minExchangesRequired: 0 # 0 = auto-detect
    candleGranularityMinutes: 1
    backfillStartDate: "1_year_ago" # Configurable backfill start
    catchUpInitialDays: 7 # Configurable initial catch-up
    apiCallDelaySeconds: 2 # Delay between API calls to respect rate limits
    # Storage Configuration
    influxDbBucket: "tradestream-data"
    redisKeyCryptoSymbols: "top_cryptocurrencies"
    # Debug/Testing Configuration (optional)
    # dryRunLimit: 5  # Uncomment to limit symbols processed in dry run mode
  secrets:
    # InfluxDB credentials
    influxDb:
      name: "influxdb-admin-secret"
      tokenKey: "admin-token"
  redis:
    host: '{{ include "tradestream.fullname" . }}-redis-master'
    port: 6379
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  concurrencyPolicy: "Forbid" # Prevents multiple jobs from running concurrently
  failedJobsHistoryLimit: 2
  successfulJobsHistoryLimit: 3
# Redis configuration
redis:
  enabled: true # Set to true to deploy Redis
  # Use bitnamilegacy repository since bitnami moved images there
  image:
    registry: docker.io
    repository: bitnamilegacy/redis
    tag: 8.2.1-debian-12-r0
  architecture: standalone # Use standalone for simplicity, can be changed to replication or sentinel
  auth:
    enabled: false # Disable password for simplicity, enable in production
    # persistence:
    #   enabled: true
    #   size: 8Gi
# PostgreSQL configuration
postgresql:
  enabled: true
  # Use bitnamilegacy repository since bitnami moved images there
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: 17.6.0-debian-12-r4
  auth:
    postgresPassword: "" # REQUIRED: Set via --set or external secret
    username: "postgres"
    database: "tradestream"
  primary:
    persistence:
      enabled: true
      size: 20Gi
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "1"
        memory: "2Gi"

# Database Migration configuration (Alembic)
databaseMigration:
  enabled: true
  image:
    repository: "ghcr.io/tradestreamhq/db-migrations"
    tag: "latest"
    pullPolicy: IfNotPresent
  # Wait for PostgreSQL before running migrations
  initContainers: true
  # Set to true to stamp the database at head without running migrations
  # (use for existing databases already managed by Flyway)
  stampOnly: false
  # Database connection (reuses PostgreSQL config)
  database:
    host: '{{ include "tradestream.fullname" . }}-postgresql'
    port: 5432
    database: "tradestream"
    username: "postgres"
    passwordSecret:
      name: '{{ include "tradestream.fullname" . }}-postgresql'
      key: "postgres-password"
  # Resource limits
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"
  # Job configuration
  ttlSecondsAfterFinished: 300
  backoffLimit: 3

# Top Crypto Updater CronJob configuration
topCryptoUpdaterCronjob:
  enabled: true
  schedule: "*/15 * * * *" # Run every 15 minutes
  startingDeadlineSeconds: 300 # Add deadline to prevent too many missed start times
  image:
    repository: "ghcr.io/tradestreamhq/top-crypto-updater"
    pullPolicy: IfNotPresent
    tag: "v2.45.97-develop"
  concurrencyPolicy: "Forbid" # Prevents multiple jobs from running concurrently
  failedJobsHistoryLimit: 1
  successfulJobsHistoryLimit: 3
  config:
    topNCryptos: 20 # Number of top cryptos to fetch
    redisKey: "top_cryptocurrencies"
  # Secrets for CMC API key and Redis connection details will be mounted if needed
  # For now, assuming Redis is accessible via service name within the same namespace
  # and CMC API key is passed as an environment variable from a secret
  secrets:
    cmcApiKey:
      name: "coinmarketcap" # Assuming this secret exists and has the apiKey
      key: "apiKey"
  redis:
    host: '{{ include "tradestream.fullname" . }}-redis-master' # Dynamically set Redis host
    port: 6379
# Strategy Discovery Request Factory CronJob configuration
strategyDiscoveryRequestFactory:
  enabled: true
  schedule: "*/5 * * * *" # Run every 5 minutes instead of every minute
  image:
    repository: "ghcr.io/tradestreamhq/strategy-discovery-request-factory"
    pullPolicy: IfNotPresent
    tag: "v2.45.97-develop"
  concurrencyPolicy: "Forbid" # Prevents multiple jobs from running concurrently
  failedJobsHistoryLimit: 1
  successfulJobsHistoryLimit: 3
  startingDeadlineSeconds: 300 # Add deadline to prevent too many missed start times
  config:
    influxDbBucketTracker: "tradestream-data" # Bucket for tracker state
    kafkaTopic: "strategy-discovery-requests"
    trackerServiceName: "strategy_discovery_processor" # Name for this service's own state
    globalStatusTrackerServiceName: "global_candle_status" # Name of the service that reports latest candle data
    minProcessingAdvanceMinutes: 1 # Min minutes new data must be ahead to trigger (reduced from 5 to 1)
    fibonacciWindowsMinutes: # Fibonacci sequence windows in minutes
      - "60" # ~1 hour (added for testing and initial data availability)
      - "1597" # ~1.1 days
      - "2584" # ~1.8 days
      - "4181" # ~2.9 days
      - "6765" # ~4.7 days
      - "10946" # ~7.6 days
      - "17711" # ~12.3 days
      - "28657" # ~19.9 days
      - "46368" # ~32.2 days
      - "75025" # ~52.1 days
      - "121393" # ~84.3 days
    defaultTopN: 5
    defaultPopulationSize: 50
  redis:
    host: '{{ include "tradestream.fullname" . }}-redis-master'
    port: 6379
    keyCryptoSymbols: "top_cryptocurrencies"
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "200m"
      memory: "512Mi"
# Strategy Consumer CronJob configuration
strategyConsumer:
  enabled: true
  schedule: "*/5 * * * *" # Run every 5 minutes
  startingDeadlineSeconds: 300 # Add deadline to prevent too many missed start times
  image:
    repository: "ghcr.io/tradestreamhq/strategy-consumer"
    pullPolicy: IfNotPresent
    tag: "v2.45.97-develop"
  concurrencyPolicy: "Forbid" # Prevent multiple instances from running simultaneously
  failedJobsHistoryLimit: 2
  successfulJobsHistoryLimit: 3
  job:
    backoffLimit: 2
    ttlSecondsAfterFinished: 3600 # Cleans up finished jobs after 1 hour
    restartPolicy: "OnFailure"
  config:
    # Kafka Configuration
    kafkaBootstrapServers: '{{ include "tradestream.fullname" . }}-kafka:9092'
    kafkaTopic: "discovered-strategies"
    kafkaGroupId: "strategy_consumer_group"
    kafkaAutoOffsetReset: "latest"
    # Processing Configuration
    batchSize: 100
    pollTimeoutMs: 1000
    idleTimeoutSeconds: 60
    maxProcessingTimeSeconds: 300
    # Connection Configuration
    postgresMinConnections: 1
    postgresMaxConnections: 10
  # Database configuration - uses the PostgreSQL chart
  database:
    host: '{{ include "tradestream.fullname" . }}-postgresql'
    port: 5432
    database: "tradestream"
    username: "postgres"
    # Reference the auto-generated PostgreSQL secret
    passwordSecret:
      name: '{{ include "tradestream.fullname" . }}-postgresql'
      key: "postgres-password"
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

