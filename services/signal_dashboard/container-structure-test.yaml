schemaVersion: "2.0.0"

fileExistenceTests:
  - name: "index.html exists"
    path: "/services/signal_dashboard/index.html"
    shouldExist: true
  - name: "nginx.conf exists"
    path: "/services/signal_dashboard/nginx.conf"
    shouldExist: true

fileContentTests:
  - name: "index.html contains TradeStream"
    path: "/services/signal_dashboard/index.html"
    expectedContents:
      - "TradeStream"
      - "Signal Dashboard"
      - "EventSource"
