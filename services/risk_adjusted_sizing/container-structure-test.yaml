schemaVersion: 2.0.0

# metadataTest:
#   workdir: "/services/risk_adjusted_sizing"

fileExistenceTests:
  - name: "Python executable exists"
    path: "/services/risk_adjusted_sizing/app"
    shouldExist: true
    permissions: "-rwxr-xr-x"

  - name: "Main script exists"
    path: "/services/risk_adjusted_sizing/main.py"
    shouldExist: true
    permissions: "-rwxr-xr-x"

commandTests:
  - name: "Python version check"
    command: "python3"
    args: ["--version"]
    expectedOutput: ["Python 3.13"]

  - name: "Binary exists and is executable"
    command: "ls"
    args: ["-la", "/services/risk_adjusted_sizing/app"]
    expectedOutput: ["-rwxr-xr-x"]

licenseTests:
  - debian: true
