schemaVersion: 2.0.0

fileExistenceTests:
  - name: "Python executable exists"
    path: "/services/wallet_anomaly_detector/app"
    shouldExist: true
    permissions: "-rwxr-xr-x"

  - name: "Main script exists"
    path: "/services/wallet_anomaly_detector/main.py"
    shouldExist: true
    permissions: "-rwxr-xr-x"

commandTests:
  - name: "Python version check"
    command: "python3"
    args: ["--version"]
    expectedOutput: ["Python 3.13"]

  - name: "Binary exists and is executable"
    command: "ls"
    args: ["-la", "/services/wallet_anomaly_detector/app"]
    expectedOutput: ["-rwxr-xr-x"]

licenseTests:
  - debian: true
