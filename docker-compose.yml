services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: tradestream-app
    ports:
      - "${APP_HTTP_PORT:-8080}:8080"
      - "${APP_GRPC_PORT:-50051}:50051"
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tradestream

  postgres:
    image: postgres:16-alpine
    container_name: tradestream-postgres
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tradestream}
      POSTGRES_USER: ${POSTGRES_USER:-tradestream}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tradestream} -d ${POSTGRES_DB:-tradestream}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - tradestream

  redis:
    image: redis:7-alpine
    container_name: tradestream-redis
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tradestream

volumes:
  postgres_data:
  redis_data:

networks:
  tradestream:
    driver: bridge
