name: LINEAR_REGRESSION_CHANNELS
description: Linear regression channel breakout using Bollinger-style bands
complexity: MEDIUM
parameterMessageType: com.verlumen.tradestream.strategies.LinearRegressionChannelsParameters

indicators:
  - id: close
    type: CLOSE
    input: close
    params: {}
  - id: upperBand
    type: BOLLINGER_UPPER
    input: close
    params:
      period: "${period}"
      multiplier: "${multiplier}"
  - id: lowerBand
    type: BOLLINGER_LOWER
    input: close
    params:
      period: "${period}"
      multiplier: "${multiplier}"

entryConditions:
  - type: CROSSED_UP
    indicator: close
    params:
      crosses: upperBand

exitConditions:
  - type: CROSSED_DOWN
    indicator: close
    params:
      crosses: lowerBand

parameters:
  - name: period
    type: INTEGER
    min: 10
    max: 50
    defaultValue: 20
  - name: multiplier
    type: DOUBLE
    min: 1.0
    max: 3.0
    defaultValue: 2.0
