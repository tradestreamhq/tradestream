name: DOUBLE_EMA_CROSSOVER
description: Short EMA crosses Long EMA
complexity: SIMPLE
parameterMessageType: com.verlumen.tradestream.strategies.DoubleEmaCrossoverParameters

indicators:
  - id: shortEma
    type: EMA
    input: close
    params:
      period: "${shortEmaPeriod}"
  - id: longEma
    type: EMA
    input: close
    params:
      period: "${longEmaPeriod}"

entryConditions:
  - type: CROSSED_UP
    indicator: shortEma
    params:
      crosses: longEma

exitConditions:
  - type: CROSSED_DOWN
    indicator: shortEma
    params:
      crosses: longEma

parameters:
  - name: shortEmaPeriod
    type: INTEGER
    min: 2
    max: 30
    defaultValue: 12
  - name: longEmaPeriod
    type: INTEGER
    min: 10
    max: 100
    defaultValue: 26
