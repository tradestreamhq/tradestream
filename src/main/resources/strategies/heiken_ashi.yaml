name: HEIKEN_ASHI
description: Heiken Ashi candle direction change
complexity: SIMPLE
parameterMessageType: com.verlumen.tradestream.strategies.HeikenAshiParameters

indicators:
  - id: close
    type: CLOSE
    input: close
    params: {}
  - id: ema
    type: EMA
    input: close
    params:
      period: "${period}"
  - id: sma
    type: SMA
    input: close
    params:
      period: "${period}"

entryConditions:
  - type: CROSSED_UP
    indicator: ema
    params:
      crosses: sma

exitConditions:
  - type: CROSSED_DOWN
    indicator: ema
    params:
      crosses: sma

parameters:
  - name: period
    type: INTEGER
    min: 5
    max: 30
    defaultValue: 14
