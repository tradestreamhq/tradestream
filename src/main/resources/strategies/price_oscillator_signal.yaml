name: PRICE_OSCILLATOR_SIGNAL
description: Price oscillator (fast EMA minus slow EMA) crosses its signal line
complexity: SIMPLE
parameterMessageType: com.verlumen.tradestream.strategies.PriceOscillatorSignalParameters

indicators:
  - id: macd
    type: MACD
    input: close
    params:
      shortPeriod: "${fastPeriod}"
      longPeriod: "${slowPeriod}"
  - id: signal
    type: EMA
    input: macd
    params:
      period: "${signalPeriod}"

entryConditions:
  - type: CROSSED_UP
    indicator: macd
    params:
      crosses: signal

exitConditions:
  - type: CROSSED_DOWN
    indicator: macd
    params:
      crosses: signal

parameters:
  - name: fastPeriod
    type: INTEGER
    min: 5
    max: 20
    defaultValue: 10
  - name: slowPeriod
    type: INTEGER
    min: 10
    max: 50
    defaultValue: 20
  - name: signalPeriod
    type: INTEGER
    min: 5
    max: 20
    defaultValue: 9
