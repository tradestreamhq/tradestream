name: PRICE_OSCILLATOR_SIGNAL
description: Price Oscillator crosses its Signal Line
complexity: SIMPLE
parameterMessageType: com.verlumen.tradestream.strategies.PriceOscillatorSignalParameters

indicators:
  - id: fastEma
    type: EMA
    input: close
    params:
      period: "${fastPeriod}"
  - id: slowEma
    type: EMA
    input: close
    params:
      period: "${slowPeriod}"
  - id: macd
    type: MACD
    input: close
    params:
      shortPeriod: "${fastPeriod}"
      longPeriod: "${slowPeriod}"
  - id: signal
    type: EMA
    input: macd
    params:
      period: "${signalPeriod}"

entryConditions:
  - type: CROSSED_UP
    indicator: macd
    params:
      crosses: signal

exitConditions:
  - type: CROSSED_DOWN
    indicator: macd
    params:
      crosses: signal

parameters:
  - name: fastPeriod
    type: INTEGER
    min: 5
    max: 15
    defaultValue: 10
  - name: slowPeriod
    type: INTEGER
    min: 15
    max: 30
    defaultValue: 20
  - name: signalPeriod
    type: INTEGER
    min: 5
    max: 12
    defaultValue: 9
