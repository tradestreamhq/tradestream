name: PRICE_OSCILLATOR_SIGNAL
description: Price Oscillator Signal - enters when price oscillator crosses above signal line, exits when it crosses below
complexity: MODERATE
parameterMessageType: com.verlumen.tradestream.strategies.PriceOscillatorSignalParameters

indicators:
  - id: priceOscillator
    type: PRICE_OSCILLATOR
    params:
      fastPeriod: "${fastPeriod}"
      slowPeriod: "${slowPeriod}"
  - id: signalLine
    type: EMA
    params:
      period: "${signalPeriod}"
      source: priceOscillator

entryConditions:
  - type: CROSSED_UP
    indicator: priceOscillator
    params:
      crosses: signalLine

exitConditions:
  - type: CROSSED_DOWN
    indicator: priceOscillator
    params:
      crosses: signalLine

parameters:
  - name: fastPeriod
    type: INTEGER
    min: 5
    max: 20
    defaultValue: 10
  - name: slowPeriod
    type: INTEGER
    min: 10
    max: 50
    defaultValue: 20
  - name: signalPeriod
    type: INTEGER
    min: 5
    max: 20
    defaultValue: 9
