name: FRAMA
description: Fractal Adaptive Moving Average - enters when price crosses above FRAMA, exits when price crosses below
complexity: MODERATE
parameterMessageType: com.verlumen.tradestream.strategies.FramaParameters

indicators:
  - id: frama
    type: FRAMA
    params:
      sc: "${sc}"
      fc: "${fc}"
      alpha: "${alpha}"

entryConditions:
  - type: CROSSED_UP
    indicator: close
    params:
      crosses: frama

exitConditions:
  - type: CROSSED_DOWN
    indicator: close
    params:
      crosses: frama

parameters:
  - name: sc
    type: DOUBLE
    min: 0.1
    max: 2.0
    defaultValue: 0.5
  - name: fc
    type: INTEGER
    min: 5
    max: 50
    defaultValue: 20
  - name: alpha
    type: DOUBLE
    min: 0.1
    max: 1.0
    defaultValue: 0.5
