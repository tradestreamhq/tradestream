name: MOMENTUM_PINBALL
description: Combines short and long term momentum - enters when long momentum is positive and short momentum crosses above zero
complexity: SIMPLE
parameterMessageType: com.verlumen.tradestream.strategies.MomentumPinballParameters

indicators:
  - id: shortMomentum
    type: MOMENTUM
    input: close
    params:
      period: "${shortPeriod}"
  - id: longMomentum
    type: MOMENTUM
    input: close
    params:
      period: "${longPeriod}"

entryConditions:
  - type: OVER_CONSTANT
    indicator: longMomentum
    params:
      threshold: 0
  - type: CROSSED_UP
    indicator: shortMomentum
    params:
      value: 0

exitConditions:
  - type: UNDER_CONSTANT
    indicator: longMomentum
    params:
      threshold: 0
  - type: CROSSED_DOWN
    indicator: shortMomentum
    params:
      value: 0

parameters:
  - name: shortPeriod
    type: INTEGER
    min: 2
    max: 30
    defaultValue: 10
  - name: longPeriod
    type: INTEGER
    min: 5
    max: 60
    defaultValue: 20
