name: MOMENTUM_PINBALL
description: Dual momentum — long momentum confirms trend while short momentum triggers entry/exit on zero-line crossover
complexity: MEDIUM
parameterMessageType: com.verlumen.tradestream.strategies.MomentumPinballParameters

indicators:
  - id: close
    type: CLOSE
  - id: shortMomentum
    type: MOMENTUM
    input: close
    params:
      period: "${shortPeriod}"
  - id: longMomentum
    type: MOMENTUM
    input: close
    params:
      period: "${longPeriod}"

entryConditions:
  - type: OVER
    indicator: longMomentum
    params:
      value: 0.0
  - type: CROSSED_UP
    indicator: shortMomentum
    params:
      value: 0.0

exitConditions:
  - type: UNDER
    indicator: longMomentum
    params:
      value: 0.0
  - type: CROSSED_DOWN
    indicator: shortMomentum
    params:
      value: 0.0

parameters:
  - name: shortPeriod
    type: INTEGER
    min: 2
    max: 30
    defaultValue: 10
  - name: longPeriod
    type: INTEGER
    min: 5
    max: 60
    defaultValue: 20
