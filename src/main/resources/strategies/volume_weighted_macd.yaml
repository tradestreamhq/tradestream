name: VOLUME_WEIGHTED_MACD
description: Volume Weighted MACD strategy using volume-sensitive MACD with signal line crossover
complexity: SIMPLE
parameterMessageType: com.verlumen.tradestream.strategies.VolumeWeightedMacdParameters

indicators:
  - id: macd
    type: MACD
    params:
      shortPeriod: "${shortPeriod}"
      longPeriod: "${longPeriod}"
  - id: signalLine
    type: EMA
    input: macd
    params:
      period: "${signalPeriod}"

entryConditions:
  - type: CROSSED_UP
    indicator: macd
    params:
      crosses: signalLine

exitConditions:
  - type: CROSSED_DOWN
    indicator: macd
    params:
      crosses: signalLine

parameters:
  - name: shortPeriod
    type: INTEGER
    min: 8
    max: 16
    defaultValue: 12
  - name: longPeriod
    type: INTEGER
    min: 20
    max: 32
    defaultValue: 26
  - name: signalPeriod
    type: INTEGER
    min: 6
    max: 12
    defaultValue: 9
