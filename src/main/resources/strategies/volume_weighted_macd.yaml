name: VOLUME_WEIGHTED_MACD
description: Volume Weighted MACD - enters when MACD line crosses above signal line, exits when it crosses below
complexity: MODERATE
parameterMessageType: com.verlumen.tradestream.strategies.VolumeWeightedMacdParameters

indicators:
  - id: macdLine
    type: VOLUME_WEIGHTED_MACD
    params:
      shortPeriod: "${shortPeriod}"
      longPeriod: "${longPeriod}"
  - id: signalLine
    type: EMA
    params:
      period: "${signalPeriod}"
      source: macdLine

entryConditions:
  - type: CROSSED_UP
    indicator: macdLine
    params:
      crosses: signalLine

exitConditions:
  - type: CROSSED_DOWN
    indicator: macdLine
    params:
      crosses: signalLine

parameters:
  - name: shortPeriod
    type: INTEGER
    min: 5
    max: 20
    defaultValue: 12
  - name: longPeriod
    type: INTEGER
    min: 15
    max: 50
    defaultValue: 26
  - name: signalPeriod
    type: INTEGER
    min: 5
    max: 15
    defaultValue: 9
