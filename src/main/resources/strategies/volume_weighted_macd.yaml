name: VOLUME_WEIGHTED_MACD
description: Volume Weighted MACD crosses Signal Line
complexity: SIMPLE
parameterMessageType: com.verlumen.tradestream.strategies.VolumeWeightedMacdParameters

indicators:
  - id: shortEma
    type: EMA
    input: close
    params:
      period: "${shortPeriod}"
  - id: longEma
    type: EMA
    input: close
    params:
      period: "${longPeriod}"
  - id: macd
    type: MACD
    input: close
    params:
      shortPeriod: "${shortPeriod}"
      longPeriod: "${longPeriod}"
  - id: signal
    type: EMA
    input: macd
    params:
      period: "${signalPeriod}"

entryConditions:
  - type: CROSSED_UP
    indicator: macd
    params:
      crosses: signal

exitConditions:
  - type: CROSSED_DOWN
    indicator: macd
    params:
      crosses: signal

parameters:
  - name: shortPeriod
    type: INTEGER
    min: 8
    max: 16
    defaultValue: 12
  - name: longPeriod
    type: INTEGER
    min: 20
    max: 32
    defaultValue: 26
  - name: signalPeriod
    type: INTEGER
    min: 5
    max: 12
    defaultValue: 9
