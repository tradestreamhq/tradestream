name: ELDER_RAY_MA
description: Elder Ray with EMA - enters when high crosses above EMA (bull power positive)
complexity: SIMPLE
parameterMessageType: com.verlumen.tradestream.strategies.ElderRayMAParameters

indicators:
  - id: highPrice
    type: HIGH
  - id: lowPrice
    type: LOW
  - id: ema
    type: EMA
    params:
      period: "${emaPeriod}"

entryConditions:
  - type: CROSSED_UP
    indicator: highPrice
    params:
      crosses: ema

exitConditions:
  - type: CROSSED_DOWN
    indicator: lowPrice
    params:
      crosses: ema

parameters:
  - name: emaPeriod
    type: INTEGER
    min: 10
    max: 30
    defaultValue: 20
